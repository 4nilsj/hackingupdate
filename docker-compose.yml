services:
  hackingupdate:
    build: .
    container_name: hackingupdate
    deploy:
      resources:
        limits:
          cpus: '0.50'      # Cap to max 50% of 1 CPU core
          memory: 512M     # Cap to max 512 MB RAM
    env_file:
      - .env
    volumes:
      # Mount code directories for instant live updates
      - ./scripts:/app/scripts
      - ./hackingupdate:/app/hackingupdate
      # Persist generated reports on host
      - ./reports:/app/reports
      # Persist logs on host
      - ./logs:/app/logs
      # Allow custom feeds
      - ./feeds:/app/feeds
      # Persist SQLite database on host
      - ./data:/app/data
    # Run the full pipeline
    command: ["hackingupdate", "run"]
    restart: "no"
